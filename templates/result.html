<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>判定結果</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='home.css') }}"
    />
  </head>
  <body>
    <div class="back">
      <a href="{{ url_for('home') }}">戻る</a>
    </div>
    <div class="container">
      <div class="content">
        <h1>判定結果</h1>
        <div class="result">
          <!-- Base64エンコードされた画像データを表示 -->
          <img
            id="resultImage"
            src="data:image/jpeg;base64,{{ image_data }}"
            alt="判定結果"
            style="max-width: 300px"
          />
          <p id="resultText">{{ result_text }}</p>
        </div>
      </div>
      <footer>©︎ 2024 Neo Ito</footer>
    </div>
  </body>
</html>
